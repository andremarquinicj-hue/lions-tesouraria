<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Lions Clube · Tesouraria</title>
<meta name="theme-color" content="#0A2E6B" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230A2E6B'/%3E%3Ctext x='32' y='44' font-size='34' text-anchor='middle' fill='%23E9A21B' font-family='Georgia'%3EL%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --azul:#0A2E6B; --azul-2:#123F8F; --azul-claro:#EAF0FB;
  --dourado:#E9A21B; --dourado-2:#F2B233;
  --fundo:#F4F6FA; --card:#FFFFFF; --linha:#E3E8F1; --linha-forte:#C9D3E4;
  --ink:#16233F; --cinza:#5F6B85; --cinza-2:#8A94AB;
  --verde:#147A4D; --verde-bg:#E7F5EE;
  --vermelho:#BF3A3A; --vermelho-bg:#FBEAEA;
  --sombra:0 1px 2px rgba(16,32,64,.05),0 8px 24px -12px rgba(16,32,64,.18);
  --raio:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--fundo);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
h1,h2,h3,.display{font-family:'Archivo',sans-serif}
.num{font-variant-numeric:tabular-nums lining-nums}

/* ===== layout ===== */
.app{display:flex;min-height:100vh}
.sidebar{width:258px;background:linear-gradient(180deg,var(--azul) 0%,#081F4A 100%);color:#DCE5F5;display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:40;transition:transform .25s ease}
.brand{padding:22px 20px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.09)}
.brand .emblema{width:42px;height:42px;border-radius:11px;background:var(--dourado);color:var(--azul);display:grid;place-items:center;font-family:'Archivo';font-weight:800;font-size:22px;flex-shrink:0}
.brand h1{font-size:16px;font-weight:700;color:#fff;line-height:1.15}
.brand small{font-size:11px;color:#9FB2D6;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.nav{flex:1;overflow-y:auto;padding:14px 10px}
.nav-label{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#7E93BE;padding:14px 12px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:9px;font-size:14px;font-weight:500;color:#C6D3EC;text-align:left;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.ativo{background:rgba(233,162,27,.16);color:#FFD98A}
.nav-item .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.nav-item .ic{width:18px;text-align:center;flex-shrink:0;opacity:.9}
.nav-item .saldo-mini{margin-left:auto;font-size:11.5px;color:#8FA5CE;font-weight:500}
.nav-item.ativo .saldo-mini{color:#E9C77E}
.sidebar-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.09);font-size:11.5px;color:#8FA5CE;display:flex;align-items:center;gap:8px}
.modo-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:10.5px;font-weight:600;letter-spacing:.04em}
.modo-nuvem{background:rgba(20,160,100,.22);color:#6FE3AE}
.modo-local{background:rgba(233,162,27,.18);color:#F2C766}

.main{flex:1;margin-left:258px;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--card);border-bottom:1px solid var(--linha);padding:14px 26px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:30}
.topbar h2{font-size:19px;font-weight:700}
.topbar .sub{font-size:12.5px;color:var(--cinza)}
.hamb{display:none;font-size:20px;padding:6px 10px;border-radius:8px;background:var(--azul-claro);color:var(--azul)}
.spacer{flex:1}
.conteudo{padding:24px 26px 60px;max-width:1180px;width:100%;margin:0 auto}

/* ===== botões ===== */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;transition:filter .15s, transform .05s}
.btn:active{transform:translateY(1px)}
.btn-ouro{background:var(--dourado);color:#3A2A05}
.btn-ouro:hover{background:var(--dourado-2)}
.btn-azul{background:var(--azul-2);color:#fff}
.btn-azul:hover{filter:brightness(1.12)}
.btn-borda{border:1.5px solid var(--linha-forte);background:var(--card);color:var(--ink)}
.btn-borda:hover{background:var(--azul-claro)}
.btn-perigo{background:var(--vermelho-bg);color:var(--vermelho)}
.btn-mini{padding:6px 12px;font-size:13px;border-radius:8px}

/* ===== cards e grid ===== */
.grid-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:22px}
.card{background:var(--card);border:1px solid var(--linha);border-radius:var(--raio);box-shadow:var(--sombra)}
.kpi{padding:18px 20px}
.kpi .rotulo{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--cinza);display:flex;align-items:center;gap:7px}
.kpi .valor{font-family:'Archivo';font-size:26px;font-weight:700;margin-top:6px}
.kpi .extra{font-size:12.5px;color:var(--cinza);margin-top:4px}
.kpi.destaque{background:linear-gradient(135deg,var(--azul) 0%,var(--azul-2) 100%);border:none;color:#fff}
.kpi.destaque .rotulo{color:#AFC3E8}
.kpi.destaque .valor{color:#fff}
.kpi.destaque .extra{color:#9FB2D6}
.pos{color:var(--verde)} .neg{color:var(--vermelho)}
.kpi.destaque .pos{color:#7CE8B4}.kpi.destaque .neg{color:#FF9E9E}

.grid-2{display:grid;grid-template-columns:1.55fr 1fr;gap:14px;margin-bottom:22px}
.card-titulo{padding:16px 20px 0;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.card-corpo{padding:14px 20px 20px}
.chart-box{position:relative;height:265px}

/* ===== livro caixa (assinatura visual) ===== */
.livro{background:var(--card);border:1px solid var(--linha);border-radius:var(--raio);box-shadow:var(--sombra);overflow:hidden}
.livro-head{padding:18px 22px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--azul);flex-wrap:wrap}
.livro-head .faixa{width:5px;align-self:stretch;border-radius:4px}
.livro-head h3{font-size:17px}
.livro-head .desc{font-size:12.5px;color:var(--cinza)}
.saldo-pill{margin-left:auto;text-align:right}
.saldo-pill .r{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--cinza);font-weight:600}
.saldo-pill .v{font-family:'Archivo';font-size:22px;font-weight:700}
.tabela-wrap{overflow-x:auto}
table.caderno{width:100%;border-collapse:collapse;min-width:680px}
.caderno th{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--cinza);font-weight:700;text-align:left;padding:11px 14px;background:var(--azul-claro);border-bottom:1px solid var(--linha-forte)}
.caderno th.num,.caderno td.vnum{text-align:right}
.caderno td{padding:11px 14px;border-bottom:1px solid var(--linha);font-size:14px;vertical-align:middle}
.caderno tbody tr:hover{background:#F8FAFE;cursor:pointer}
.caderno .data{white-space:nowrap;color:var(--cinza);font-size:13px}
.caderno .desc-l{font-weight:500}
.caderno .forma-tag{display:inline-block;font-size:11px;font-weight:600;padding:2.5px 8px;border-radius:6px;background:var(--azul-claro);color:var(--azul-2);margin-left:8px;white-space:nowrap}
.caderno td.deb{color:var(--vermelho);font-weight:600}
.caderno td.cre{color:var(--verde);font-weight:600}
.caderno td.sal{font-weight:700;background:#FDF7EA;border-left:1px solid var(--linha-forte)}
.caderno th.sal-h{background:#F6E9CB;color:#7A5A10;border-left:1px solid var(--linha-forte)}
.caderno tr.abertura td{color:var(--cinza);font-style:italic;background:#FAFBFD}
.vazio{padding:44px 20px;text-align:center;color:var(--cinza)}
.vazio b{display:block;color:var(--ink);margin-bottom:5px;font-size:15px}

/* ===== filtros / formulários ===== */
.linha-acoes{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.campo{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.campo label{font-size:12.5px;font-weight:600;color:var(--cinza)}
.campo input,.campo select,.campo textarea{padding:10px 12px;border:1.5px solid var(--linha-forte);border-radius:9px;background:#fff;width:100%}
.campo input:focus,.campo select:focus{outline:2px solid var(--azul-2);outline-offset:1px;border-color:var(--azul-2)}
.duo{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.toggle-tipo{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.toggle-tipo button{padding:11px;border-radius:10px;font-weight:700;font-size:14px;border:1.5px solid var(--linha-forte);background:#fff;color:var(--cinza)}
.toggle-tipo button.on-cre{background:var(--verde-bg);border-color:var(--verde);color:var(--verde)}
.toggle-tipo button.on-deb{background:var(--vermelho-bg);border-color:var(--vermelho);color:var(--vermelho)}

/* ===== modal ===== */
.fundo-modal{position:fixed;inset:0;background:rgba(10,26,55,.55);display:grid;place-items:center;z-index:60;padding:16px;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:16px;width:100%;max-width:440px;max-height:92vh;overflow-y:auto;padding:24px;box-shadow:0 24px 60px -12px rgba(6,18,43,.45)}
.modal h3{font-size:18px;margin-bottom:16px}
.modal-acoes{display:flex;gap:10px;margin-top:18px}
.modal-acoes .btn{flex:1;justify-content:center}

/* ===== relatório ===== */
.rel-controles{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:20px}
.rel-controles .campo{margin-bottom:0;min-width:180px}
.folha{background:#fff;border:1px solid var(--linha);border-radius:var(--raio);box-shadow:var(--sombra);padding:38px 44px;max-width:860px}
.folha-head{text-align:center;border-bottom:3px double var(--azul);padding-bottom:16px;margin-bottom:22px}
.folha-head .clube{font-family:'Archivo';font-size:21px;font-weight:800;color:var(--azul);text-transform:uppercase;letter-spacing:.03em}
.folha-head .titulo-rel{font-size:14px;font-weight:600;color:var(--ink);margin-top:4px}
.folha-head .periodo{font-size:13px;color:var(--cinza);margin-top:2px}
.folha h4{font-family:'Archivo';font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--azul);margin:24px 0 10px;padding-bottom:5px;border-bottom:1.5px solid var(--dourado)}
table.rel{width:100%;border-collapse:collapse;font-size:13.5px}
.rel th{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--cinza);text-align:left;padding:7px 9px;border-bottom:1.5px solid var(--linha-forte)}
.rel th.num{text-align:right}
.rel td{padding:7px 9px;border-bottom:1px solid var(--linha)}
.rel td.vnum{text-align:right}
.rel tr.total td{font-weight:700;border-top:2px solid var(--azul);border-bottom:none;background:#FDF7EA}
.assinaturas{display:grid;grid-template-columns:1fr 1fr;gap:60px;margin-top:64px}
.assinaturas .linha-ass{border-top:1.5px solid var(--ink);padding-top:7px;text-align:center;font-size:12.5px}
.assinaturas .cargo{color:var(--cinza);font-size:11.5px}
.folha-foot{margin-top:30px;text-align:center;font-size:11px;color:var(--cinza-2)}

/* ===== config ===== */
.conta-cfg{display:grid;grid-template-columns:44px 1fr 150px;gap:10px;align-items:center;padding:12px 0;border-bottom:1px solid var(--linha)}
.conta-cfg input[type=color]{width:40px;height:40px;border:none;border-radius:9px;padding:0;background:none;cursor:pointer}
.conta-cfg input[type=text],.conta-cfg input[type=number]{padding:9px 11px;border:1.5px solid var(--linha-forte);border-radius:8px;width:100%}

/* ===== auth ===== */
.tela-auth{min-height:100vh;display:grid;place-items:center;background:linear-gradient(160deg,var(--azul) 0%,#081F4A 70%);padding:20px}
.caixa-auth{background:#fff;border-radius:18px;padding:36px 32px;width:100%;max-width:380px;text-align:center;box-shadow:0 30px 80px -20px rgba(0,0,0,.5)}
.caixa-auth .emblema{width:64px;height:64px;border-radius:16px;background:var(--dourado);color:var(--azul);display:grid;place-items:center;font-family:'Archivo';font-weight:800;font-size:34px;margin:0 auto 16px}
.caixa-auth h2{font-size:20px;margin-bottom:6px}
.caixa-auth p{font-size:13.5px;color:var(--cinza);margin-bottom:20px}
.caixa-auth input{width:100%;padding:13px;border:1.5px solid var(--linha-forte);border-radius:10px;text-align:center;font-size:22px;letter-spacing:.4em;margin-bottom:14px}
.erro-pin{color:var(--vermelho);font-size:13px;margin-bottom:10px}

/* ===== responsivo ===== */
@media (max-width: 920px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.aberta{transform:translateX(0)}
  .main{margin-left:0}
  .hamb{display:block}
  .grid-2{grid-template-columns:1fr}
  .conteudo{padding:16px 14px 80px}
  .folha{padding:24px 18px}
  .escurece{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}
}

/* ===== impressão ===== */
@media print{
  body{background:#fff}
  .sidebar,.topbar,.rel-controles,.hamb,.nao-imprime{display:none !important}
  .main{margin-left:0}
  .conteudo{padding:0;max-width:none}
  .folha{border:none;box-shadow:none;padding:10mm 6mm;max-width:none}
  .card,.livro{box-shadow:none}
  @page{margin:12mm}
}
</style>

<body>
<div id="app"></div>

<script type="module">
import { h, render } from 'https://esm.sh/preact@10.19.3';
import { useState, useEffect, useRef, useMemo } from 'https://esm.sh/preact@10.19.3/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(h);

/* ============================================================
   CONFIGURAÇÃO DO FIREBASE (opcional)
   ------------------------------------------------------------
   1. Crie um projeto em https://console.firebase.google.com
   2. Ative o Firestore Database
   3. Em "Configurações do projeto → Seus apps → Web", copie o
      objeto de configuração e cole abaixo no lugar de `null`.
   Sem isso, o sistema funciona 100% em modo local (localStorage).
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyA6Bq1BfHEprfwW7shruaJ8YPuVu270Pq0",
  authDomain: "lions-tesouraria.firebaseapp.com",
  projectId: "lions-tesouraria",
  storageBucket: "lions-tesouraria.firebasestorage.app",
  messagingSenderId: "647631110164",
  appId: "1:647631110164:web:5cbbd991866db13a13e701"
};

let db = null;
if (FIREBASE_CONFIG) {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
}

/* ================= dados padrão ================= */
const FORMAS = ['Boleto','PIX','Dinheiro','Transferência','Cheque','Débito automático','Cartão','Outro'];

function contasPadrao(){
  return [
    { id:'c1', nome:'Administrativa',   desc:'Mensalidades e despesas administrativas', cor:'#123F8F', saldoInicial:0 },
    { id:'c2', nome:'Campanhas',        desc:'Arrecadações e gastos de campanhas',      cor:'#0E7C86', saldoInicial:0 },
    { id:'c3', nome:'Eventos',          desc:'Jantares, festivais e promoções',         cor:'#8E44AD', saldoInicial:0 },
    { id:'c4', nome:'Ações Sociais',    desc:'Doações e projetos sociais',              cor:'#147A4D', saldoInicial:0 },
    { id:'c5', nome:'Sede',             desc:'Manutenção e melhorias da sede',          cor:'#B4690E', saldoInicial:0 },
    { id:'c6', nome:'Fundo de Reserva', desc:'Reserva financeira do clube',             cor:'#5A5F73', saldoInicial:0 },
  ];
}
function configPadrao(){
  return { nomeClube:'Lions Clube', contas: contasPadrao(), pinHash: null, pinDefinido:false };
}

/* ================= camada de dados ================= */
const LS_CFG='lions_cfg_v1', LS_LAN='lions_lan_v1';

function criarBackend(onData){
  if (db) {
    let cfg=null, lan=[], prontoCfg=false, prontoLan=false;
    const emitir=()=>{ if(prontoCfg&&prontoLan) onData({config:cfg, lancamentos:lan, modo:'nuvem'}); };
    db.collection('lions').doc('config').onSnapshot(s=>{
      if(s.exists){ cfg=s.data(); } else { cfg=configPadrao(); db.collection('lions').doc('config').set(cfg); }
      prontoCfg=true; emitir();
    });
    db.collection('lions_lancamentos').onSnapshot(s=>{
      lan=s.docs.map(d=>({id:d.id, ...d.data()})); prontoLan=true; emitir();
    });
    return {
      modo:'nuvem',
      salvarConfig:c=>db.collection('lions').doc('config').set(c),
      addLanc:l=>db.collection('lions_lancamentos').add(l),
      editLanc:(id,l)=>db.collection('lions_lancamentos').doc(id).set(l),
      delLanc:id=>db.collection('lions_lancamentos').doc(id).delete(),
      importar:async (cfg,lans)=>{
        await db.collection('lions').doc('config').set(cfg);
        const batch=db.batch();
        lans.forEach(l=>{ const {id,...resto}=l; batch.set(db.collection('lions_lancamentos').doc(id||undefined), resto); });
        await batch.commit();
      }
    };
  }
  // modo local
  let cfg = JSON.parse(localStorage.getItem(LS_CFG)||'null') || configPadrao();
  let lan = JSON.parse(localStorage.getItem(LS_LAN)||'[]');
  const persistir=()=>{
    localStorage.setItem(LS_CFG, JSON.stringify(cfg));
    localStorage.setItem(LS_LAN, JSON.stringify(lan));
    onData({config:cfg, lancamentos:lan, modo:'local'});
  };
  setTimeout(persistir,0);
  return {
    modo:'local',
    salvarConfig:c=>{cfg=c; persistir();},
    addLanc:l=>{lan=[...lan,{...l,id:'l'+Date.now()+Math.random().toString(36).slice(2,7)}]; persistir();},
    editLanc:(id,l)=>{lan=lan.map(x=>x.id===id?{...l,id}:x); persistir();},
    delLanc:id=>{lan=lan.filter(x=>x.id!==id); persistir();},
    importar:async(c,ls)=>{cfg=c; lan=ls; persistir();}
  };
}

/* ================= utilitários ================= */
const fmt = v => (v<0?'-':'') + 'R$ ' + Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtData = d => { const [a,m,dia]=d.split('-'); return `${dia}/${m}/${a}`; };
const hoje = () => new Date().toISOString().slice(0,10);
const mesAtual = () => new Date().toISOString().slice(0,7);
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const nomeMes = ym => { const [a,m]=ym.split('-'); return `${MESES[+m-1]} de ${a}`; };

async function sha256(txt){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(txt));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

function ordenar(lans){
  return [...lans].sort((a,b)=> a.data===b.data ? (a.criadoEm||0)-(b.criadoEm||0) : (a.data<b.data?-1:1));
}
function livroDaConta(conta, lans){
  const rows = ordenar(lans.filter(l=>l.contaId===conta.id));
  let saldo = conta.saldoInicial||0;
  return rows.map(r=>{ saldo += r.tipo==='credito' ? r.valor : -r.valor; return {...r, saldo}; });
}
function saldoConta(conta, lans, ateData){
  let s = conta.saldoInicial||0;
  for(const l of lans){
    if(l.contaId!==conta.id) continue;
    if(ateData && l.data>ateData) continue;
    s += l.tipo==='credito' ? l.valor : -l.valor;
  }
  return s;
}

function baixarArquivo(nome, conteudo, tipo='text/csv;charset=utf-8'){
  const blob = new Blob(['\uFEFF'+conteudo], {type:tipo});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = nome; a.click();
  URL.revokeObjectURL(a.href);
}
function gerarCSV(lans, contas){
  const mapa = Object.fromEntries(contas.map(c=>[c.id,c.nome]));
  const linhas = [['Data','Conta','Descrição','Forma','Tipo','Débito (R$)','Crédito (R$)']];
  ordenar(lans).forEach(l=>{
    linhas.push([ fmtData(l.data), mapa[l.contaId]||'', l.descricao, l.forma||'',
      l.tipo==='credito'?'Entrada':'Saída',
      l.tipo==='debito'? l.valor.toFixed(2).replace('.',',') : '',
      l.tipo==='credito'? l.valor.toFixed(2).replace('.',',') : '' ]);
  });
  return linhas.map(r=>r.map(c=>`"${String(c).replaceAll('"','""')}"`).join(';')).join('\n');
}

/* ================= gráficos ================= */
function GraficoBarras({lancamentos}){
  const ref = useRef(null);
  useEffect(()=>{
    const agora = new Date();
    const meses = [];
    for(let i=5;i>=0;i--){
      const d = new Date(agora.getFullYear(), agora.getMonth()-i, 1);
      meses.push(d.toISOString().slice(0,7));
    }
    const entradas = meses.map(m=>lancamentos.filter(l=>l.data.startsWith(m)&&l.tipo==='credito').reduce((s,l)=>s+l.valor,0));
    const saidas   = meses.map(m=>lancamentos.filter(l=>l.data.startsWith(m)&&l.tipo==='debito').reduce((s,l)=>s+l.valor,0));
    const chart = new Chart(ref.current, {
      type:'bar',
      data:{ labels: meses.map(m=>{const [a,mm]=m.split('-');return MESES[+mm-1].slice(0,3)+'/'+a.slice(2);}),
        datasets:[
          {label:'Entradas', data:entradas, backgroundColor:'#147A4D', borderRadius:6, maxBarThickness:34},
          {label:'Saídas', data:saidas, backgroundColor:'#BF3A3A', borderRadius:6, maxBarThickness:34}
        ]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{position:'top', labels:{font:{family:'Inter',size:12}, boxWidth:14, boxHeight:14, borderRadius:4, useBorderRadius:true}},
          tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmt(c.raw)}`}} },
        scales:{ y:{ticks:{callback:v=>'R$ '+v.toLocaleString('pt-BR')}, grid:{color:'#EDF1F8'}}, x:{grid:{display:false}} } }
    });
    return ()=>chart.destroy();
  },[lancamentos]);
  return html`<div class="chart-box"><canvas ref=${ref}></canvas></div>`;
}

function GraficoContas({config, lancamentos}){
  const ref = useRef(null);
  useEffect(()=>{
    const saldos = config.contas.map(c=>Math.max(0, saldoConta(c, lancamentos)));
    const chart = new Chart(ref.current, {
      type:'doughnut',
      data:{ labels: config.contas.map(c=>c.nome),
        datasets:[{ data:saldos, backgroundColor:config.contas.map(c=>c.cor), borderWidth:2, borderColor:'#fff' }]},
      options:{ responsive:true, maintainAspectRatio:false, cutout:'62%',
        plugins:{ legend:{position:'bottom', labels:{font:{family:'Inter',size:11.5}, boxWidth:11, boxHeight:11, padding:10}},
          tooltip:{callbacks:{label:c=>` ${c.label}: ${fmt(c.raw)}`}} } }
    });
    return ()=>chart.destroy();
  },[config, lancamentos]);
  return html`<div class="chart-box"><canvas ref=${ref}></canvas></div>`;
}

/* ================= modal de lançamento ================= */
function ModalLancamento({config, backend, fechar, contaInicial, editar}){
  const [data, setData] = useState(editar?.data || hoje());
  const [contaId, setContaId] = useState(editar?.contaId || contaInicial || config.contas[0].id);
  const [tipo, setTipo] = useState(editar?.tipo || 'credito');
  const [forma, setForma] = useState(editar?.forma || 'Boleto');
  const [descricao, setDescricao] = useState(editar?.descricao || '');
  const [valor, setValor] = useState(editar?.valor ?? '');
  const [erro, setErro] = useState('');

  const salvar = () => {
    const v = parseFloat(valor);
    if(!descricao.trim()){ setErro('Informe a descrição do lançamento.'); return; }
    if(!v || v<=0){ setErro('Informe um valor maior que zero.'); return; }
    const lanc = { data, contaId, tipo, forma, descricao:descricao.trim(), valor:v, criadoEm: editar?.criadoEm || Date.now() };
    if(editar) backend.editLanc(editar.id, lanc); else backend.addLanc(lanc);
    fechar();
  };
  const excluir = () => {
    if(confirm('Excluir este lançamento? Esta ação não pode ser desfeita.')){ backend.delLanc(editar.id); fechar(); }
  };

  return html`
    <div class="fundo-modal" onClick=${e=>{if(e.target===e.currentTarget)fechar();}}>
      <div class="modal">
        <h3>${editar?'Editar lançamento':'Novo lançamento'}</h3>
        <div class="toggle-tipo">
          <button class=${tipo==='credito'?'on-cre':''} onClick=${()=>setTipo('credito')}>↑ Entrada (crédito)</button>
          <button class=${tipo==='debito'?'on-deb':''} onClick=${()=>setTipo('debito')}>↓ Saída (débito)</button>
        </div>
        <div class="duo">
          <div class="campo"><label>Data</label><input type="date" value=${data} onInput=${e=>setData(e.target.value)} /></div>
          <div class="campo"><label>Valor (R$)</label><input type="number" step="0.01" min="0" inputmode="decimal" placeholder="0,00" value=${valor} onInput=${e=>setValor(e.target.value)} /></div>
        </div>
        <div class="campo"><label>Conta</label>
          <select value=${contaId} onChange=${e=>setContaId(e.target.value)}>
            ${config.contas.map(c=>html`<option value=${c.id}>${c.nome}</option>`)}
          </select>
        </div>
        <div class="campo"><label>Forma</label>
          <select value=${forma} onChange=${e=>setForma(e.target.value)}>
            ${FORMAS.map(f=>html`<option value=${f}>${f}</option>`)}
          </select>
        </div>
        <div class="campo"><label>Descrição</label>
          <input type="text" placeholder=${tipo==='credito'?'Ex.: Mensalidade sócio João — boleto 04/2026':'Ex.: Conta de energia da sede'} value=${descricao} onInput=${e=>setDescricao(e.target.value)} />
        </div>
        ${erro && html`<div class="erro-pin">${erro}</div>`}
        <div class="modal-acoes">
          ${editar && html`<button class="btn btn-perigo" onClick=${excluir}>Excluir</button>`}
          <button class="btn btn-borda" onClick=${fechar}>Cancelar</button>
          <button class="btn btn-ouro" onClick=${salvar}>${editar?'Salvar alterações':'Registrar'}</button>
        </div>
      </div>
    </div>`;
}

/* ================= relatório mensal ================= */
function Relatorio({config, lancamentos}){
  const [mes, setMes] = useState(mesAtual());
  const [detalhado, setDetalhado] = useState(true);

  const fimMesAnterior = useMemo(()=>{
    const [a,m] = mes.split('-').map(Number);
    const d = new Date(a, m-1, 0); // último dia do mês anterior
    return d.toISOString().slice(0,10);
  },[mes]);

  const dados = config.contas.map(c=>{
    const doMes = lancamentos.filter(l=>l.contaId===c.id && l.data.startsWith(mes));
    const ent = doMes.filter(l=>l.tipo==='credito').reduce((s,l)=>s+l.valor,0);
    const sai = doMes.filter(l=>l.tipo==='debito').reduce((s,l)=>s+l.valor,0);
    const anterior = saldoConta(c, lancamentos, fimMesAnterior);
    return { conta:c, doMes:ordenar(doMes), ent, sai, anterior, final: anterior+ent-sai };
  });
  const tEnt = dados.reduce((s,d)=>s+d.ent,0);
  const tSai = dados.reduce((s,d)=>s+d.sai,0);
  const tAnt = dados.reduce((s,d)=>s+d.anterior,0);
  const tFin = dados.reduce((s,d)=>s+d.final,0);

  const exportarCSV = () => {
    const doMes = lancamentos.filter(l=>l.data.startsWith(mes));
    baixarArquivo(`lions-resumo-${mes}.csv`, gerarCSV(doMes, config.contas));
  };

  return html`
    <div>
      <div class="rel-controles nao-imprime">
        <div class="campo"><label>Mês de referência</label>
          <input type="month" value=${mes} onInput=${e=>setMes(e.target.value)} />

        <label style="display:flex;align-items:center;gap:7px;font-size:13.5px;padding-bottom:11px;color:var(--cinza);cursor:pointer">

        <div class="spacer"></div>
        <button class="btn btn-borda" onClick=${exportarCSV}>⬇ Exportar CSV</button>
        <button class="btn btn-azul" onClick=${()=>window.print()}>🖨 Imprimir / salvar PDF</button>
      </div>

      <div class="folha">
        <div class="folha-head">
          <div class="clube">${config.nomeClube}</div>
          <div class="titulo-rel">Resumo Financeiro Mensal — Prestação de Contas à Diretoria</div>
          <div class="periodo">Período: ${nomeMes(mes)} · Emitido em ${new Date().toLocaleDateString('pt-BR')}</div>
        </div>

        <h4>Quadro consolidado por conta</h4>
        <table class="rel">
          <thead><tr>
            <th>Conta</th><th class="num">Saldo anterior</th><th class="num">Entradas</th>
            <th class="num">Saídas</th><th class="num">Saldo final</th>
          </tr></thead>
          <tbody>
            ${dados.map(d=>html`
              <tr>
                <td><span style=${`display:inline-block;width:9px;height:9px;border-radius:50%;background:${d.conta.cor};margin-right:7px`}></span>${d.conta.nome}</td>
                <td class="vnum num">${fmt(d.anterior)}</td>
                <td class="vnum num" style="color:var(--verde)">${fmt(d.ent)}</td>
                <td class="vnum num" style="color:var(--vermelho)">${fmt(d.sai)}</td>
                <td class="vnum num" style=${d.final<0?'color:var(--vermelho);font-weight:700':'font-weight:700'}>${fmt(d.final)}</td>
              </tr>`)}
            <tr class="total">
              <td>Total geral</td>
              <td class="vnum num">${fmt(tAnt)}</td>
              <td class="vnum num" style="color:var(--verde)">${fmt(tEnt)}</td>
              <td class="vnum num" style="color:var(--vermelho)">${fmt(tSai)}</td>
              <td class="vnum num">${fmt(tFin)}</td>
            </tr>
          </tbody>
        </table>

        <p style="font-size:13px;color:var(--cinza);margin-top:12px">
          Resultado do período: <b class="num" style=${(tEnt-tSai)>=0?'color:var(--verde)':'color:var(--vermelho)'}>${fmt(tEnt-tSai)}</b>
          ${' '}(${(tEnt-tSai)>=0?'superávit':'déficit'}).
        </p>

        ${detalhado && dados.filter(d=>d.doMes.length>0).map(d=>html`
          <div>
            <h4>Extrato — Conta ${d.conta.nome}</h4>
            <table class="rel">
              <thead><tr><th>Data</th><th>Descrição</th><th>Forma</th><th class="num">Débito</th><th class="num">Crédito</th></tr></thead>
              <tbody>
                ${d.doMes.map(l=>html`
                  <tr>
                    <td class="num" style="white-space:nowrap">${fmtData(l.data)}</td>
                    <td>${l.descricao}</td>
                    <td>${l.forma||''}</td>

/* ================= configurações ================= */
function Configuracoes({config, backend, lancamentos}){
  const [nome, setNome] = useState(config.nomeClube);
  const [contas, setContas] = useState(config.contas.map(c=>({...c})));
  const [pin1, setPin1] = useState('');
  const [pin2, setPin2] = useState('');
  const [msg, setMsg] = useState('');
  const inputImport = useRef(null);

  const salvarGeral = () => {
    backend.salvarConfig({...config, nomeClube:nome.trim()||'Lions Clube', contas});
    setMsg('Configurações salvas.'); setTimeout(()=>setMsg(''),2500);
  };
  const mudarConta = (i, campo, v) => {
    const nova = contas.map((c,idx)=> idx===i ? {...c, [campo]: campo==='saldoInicial'? (parseFloat(v)||0) : v} : c);
    setContas(nova);
  };
  const salvarPin = async () => {
    if(pin1.length<4){ setMsg('O PIN deve ter pelo menos 4 dígitos.'); return; }
    if(pin1!==pin2){ setMsg('Os PINs não conferem.'); return; }
    backend.salvarConfig({...config, nomeClube:nome, contas, pinHash: await sha256(pin1), pinDefinido:true});
    setPin1(''); setPin2(''); setMsg('PIN atualizado com sucesso.'); setTimeout(()=>setMsg(''),2500);
  };
  const removerPin = () => {
    if(confirm('Remover o PIN de acesso? Qualquer pessoa com o link poderá abrir o sistema.')){
      backend.salvarConfig({...config, pinHash:null, pinDefinido:true});
      setMsg('PIN removido.');
    }
  };
  const exportarBackup = () => {
    baixarArquivo(`lions-backup-${hoje()}.json`, JSON.stringify({config, lancamentos}, null, 2), 'application/json');
  };
  const importarBackup = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = async () => {
      try{
        const {config:c, lancamentos:ls} = JSON.parse(r.result);
        if(!c?.contas || !Array.isArray(ls)) throw new Error();
        if(confirm(`Importar backup com ${ls.length} lançamentos? Os dados atuais serão substituídos.`)){
          await backend.importar(c, ls); setMsg('Backup importado.');
        }
      }catch{ setMsg('Arquivo de backup inválido.'); }
    };
    r.readAsText(f);
  };

  return html`
    <div style="max-width:760px">
      <div class="card" style="padding:22px;margin-bottom:16px">
        <h3 style="margin-bottom:14px">Dados do clube</h3>
        <div class="campo"><label>Nome do clube (aparece nos relatórios)</label>
          <input type="text" value=${nome} onInput=${e=>setNome(e.target.value)} />
        </div>
        <h3 style="margin:18px 0 4px">Contas (6)</h3>
        <p style="font-size:12.5px;color:var(--cinza);margin-bottom:8px">Renomeie cada conta conforme a finalidade e informe o saldo inicial (o saldo do caderno na data em que você começar a usar o sistema).</p>
        ${contas.map((c,i)=>html`
          <div class="conta-cfg">
            <input type="color" value=${c.cor} onInput=${e=>mudarConta(i,'cor',e.target.value)} title="Cor da conta" />
            <div>
              <input type="text" value=${c.nome} onInput=${e=>mudarConta(i,'nome',e.target.value)} placeholder="Nome da conta" />
              <input type="text" value=${c.desc||''} onInput=${e=>mudarConta(i,'desc',e.target.value)} placeholder="Descrição (opcional)" style="margin-top:6px;font-size:13px" />
            </div>
            <div>
              <label style="font-size:11px;color:var(--cinza);font-weight:600">Saldo inicial (R$)</label>
              <input type="number" step="0.01" value=${c.saldoInicial} onInput=${e=>mudarConta(i,'saldoInicial',e.target.value)} />
            </div>
          </div>`)}
        <div style="margin-top:16px"><button class="btn btn-ouro" onClick=${salvarGeral}>Salvar configurações</button></div>
      </div>

      <div class="card" style="padding:22px;margin-bottom:16px">
        <h3 style="margin-bottom:6px">PIN de acesso</h3>
        <p style="font-size:13px;color:var(--cinza);margin-bottom:14px">${config.pinHash?'Há um PIN ativo protegendo o sistema.':'Nenhum PIN ativo — defina um para proteger os dados da tesouraria.'}</p>
        <div class="duo">
          <div class="campo"><label>Novo PIN</label><input type="password" inputmode="numeric" value=${pin1} onInput=${e=>setPin1(e.target.value)} /></div>
          <div class="campo"><label>Confirmar PIN</label><input type="password" inputmode="numeric" value=${pin2} onInput=${e=>setPin2(e.target.value)} /></div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-azul" onClick=${salvarPin}>Definir PIN</button>
          ${config.pinHash && html`<button class="btn btn-perigo" onClick=${removerPin}>Remover PIN</button>`}
        </div>
      </div>

      <div class="card" style="padding:22px">
        <h3 style="margin-bottom:6px">Dados</h3>
        <p style="font-size:13px;color:var(--cinza);margin-bottom:14px">Exporte um backup completo em JSON (guarde com o tesoureiro) ou o extrato geral em CSV para abrir no Excel.</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-borda" onClick=${exportarBackup}>⬇ Backup completo (JSON)</button>
          <button class="btn btn-borda" onClick=${()=>baixarArquivo(`lions-extrato-geral.csv`, gerarCSV(lancamentos, config.contas))}>⬇ Extrato geral (CSV)</button>
          <button class="btn btn-borda" onClick=${()=>inputImport.current.click()}>⬆ Importar backup</button>
          <input type="file" accept="application/json" ref=${inputImport} style="display:none" onChange=${importarBackup} />
        </div>
      </div>
      ${msg && html`<p style="margin-top:14px;font-weight:600;color:var(--azul-2)">${msg}</p>`}
    </div>`;
}

/* ================= tela de PIN ================= */
function TelaPin({config, backend, liberar}){
  const [pin, setPin] = useState('');
  const [erro, setErro] = useState('');
  const [novo1, setNovo1] = useState('');
  const [novo2, setNovo2] = useState('');
  const primeiraVez = !config.pinDefinido && !config.pinHash;

  const entrar = async () => {
    if(await sha256(pin) === config.pinHash) liberar();
    else { setErro('PIN incorreto. Tente novamente.'); setPin(''); }
  };
  const criar = async () => {
    if(novo1.length<4){ setErro('Use pelo menos 4 dígitos.'); return; }
    if(novo1!==novo2){ setErro('Os PINs não conferem.'); return; }
    backend.salvarConfig({...config, pinHash: await sha256(novo1), pinDefinido:true});
    liberar();
  };
  const pular = () => { backend.salvarConfig({...config, pinDefinido:true}); liberar(); };

  return html`
    <div class="tela-auth">
      <div class="caixa-auth">
        <div class="emblema">L</div>
        <h2>${config.nomeClube}</h2>
        ${primeiraVez ? html`
          <p>Bem-vindo à tesouraria digital. Defina um PIN de acesso para proteger os dados do clube (recomendado).</p>
          <input type="password" inputmode="numeric" placeholder="••••" value=${novo1} onInput=${e=>setNovo1(e.target.value)} />
          <input type="password" inputmode="numeric" placeholder="confirmar" value=${novo2} onInput=${e=>setNovo2(e.target.value)} />
          ${erro && html`<div class="erro-pin">${erro}</div>`}
          <button class="btn btn-ouro" style="width:100%;justify-content:center" onClick=${criar}>Criar PIN e entrar</button>
          <button class="btn" style="width:100%;justify-content:center;color:var(--cinza);margin-top:8px" onClick=${pular}>Continuar sem PIN</button>
        ` : html`
          <p>Tesouraria — controle de contas a pagar e a receber</p>
          <input type="password" inputmode="numeric" placeholder="••••" value=${pin}
            onInput=${e=>setPin(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter')entrar();}} autofocus />
          ${erro && html`<div class="erro-pin">${erro}</div>`}
          <button class="btn btn-ouro" style="width:100%;justify-content:center" onClick=${entrar}>Entrar</button>
        `}
      </div>
    </div>`;
}

/* ================= app ================= */
function App(){
  const [estado, setEstado] = useState(null);
  const [backend, setBackend] = useState(null);
  const [tela, setTela] = useState('dashboard');
  const [menuAberto, setMenuAberto] = useState(false);
  const [liberado, setLiberado] = useState(false);
  const [modal, setModal] = useState(null); // {contaId, editar}

  useEffect(()=>{
    const be = criarBackend(d=>setEstado(d));
    setBackend(be);
  },[]);

  if(!estado || !estado.config || !backend){
    return html`<div class="tela-auth"><div style="color:#9FB2D6;font-family:'Archivo';font-size:16px">Carregando tesouraria…</div></div>`;
  }
  const {config, lancamentos, modo} = estado;

  if(config.pinHash && !liberado) return html`<${TelaPin} config=${config} backend=${backend} liberar=${()=>setLiberado(true)} />`;
  if(!config.pinDefinido && !liberado) return html`<${TelaPin} config=${config} backend=${backend} liberar=${()=>setLiberado(true)} />`;

  const abrirModal = (contaId, editar=null) => setModal({contaId, editar});
  const contaAtiva = tela.startsWith('conta:') ? config.contas.find(c=>c.id===tela.slice(6)) : null;

  const titulos = {
    dashboard:['Dashboard','Visão geral das finanças do clube'],
    relatorio:['Resumo mensal','Prestação de contas para a diretoria'],
    config:['Configurações','Contas, segurança e backup'],
  };
  const [titulo, sub] = contaAtiva ? [`Conta ${contaAtiva.nome}`, 'Livro caixa — débito, crédito e saldo'] : (titulos[tela]||['','']);

  const irPara = t => { setTela(t); setMenuAberto(false); };

  return html`
    <div class="app">
      ${menuAberto && html`<div class="escurece" onClick=${()=>setMenuAberto(false)}></div>`}
      <aside class=${'sidebar'+(menuAberto?' aberta':'')}>
        <div class="brand">
          <div class="emblema">L</div>
          <div><h1>${config.nomeClube}</h1><small>Tesouraria</small></div>
        </div>
        <nav class="nav">
          <button class=${'nav-item'+(tela==='dashboard'?' ativo':'')} onClick=${()=>irPara('dashboard')}><span class="ic">◈</span> Dashboard</button>
          <div class="nav-label">Contas</div>
          ${config.contas.map(c=>html`
            <button class=${'nav-item'+(tela==='conta:'+c.id?' ativo':'')} onClick=${()=>irPara('conta:'+c.id)}>
              <span class="dot" style=${`background:${c.cor}`}></span> ${c.nome}
              <span class="saldo-mini num">${fmt(saldoConta(c,lancamentos)).replace('R$ ','')}</span>
            </button>`)}
          <div class="nav-label">Gestão</div>
          <button class=${'nav-item'+(tela==='relatorio'?' ativo':'')} onClick=${()=>irPara('relatorio')}><span class="ic">▤</span> Resumo mensal</button>
          <button class=${'nav-item'+(tela==='config'?' ativo':'')} onClick=${()=>irPara('config')}><span class="ic">⚙</span> Configurações</button>
        </nav>
        <div class="sidebar-foot">
          <span class=${'modo-badge '+(modo==='nuvem'?'modo-nuvem':'modo-local')}>${modo==='nuvem'?'● Sincronizado na nuvem':'● Modo local'}</span>
        </div>
      </aside>

      <div class="main">
        <div class="topbar">
          <button class="hamb" onClick=${()=>setMenuAberto(true)}>☰</button>
          <div><h2>${titulo}</h2><div class="sub">${sub}</div></div>
          <div class="spacer"></div>
          <button class="btn btn-ouro btn-mini nao-imprime" onClick=${()=>abrirModal(contaAtiva?.id||null)}>+ Lançamento</button>
        </div>
        <div class="conteudo">
          ${tela==='dashboard' && html`<${Dashboard} config=${config} lancamentos=${lancamentos} abrirModal=${abrirModal} />`}
          ${contaAtiva && html`<${PaginaConta} conta=${contaAtiva} lancamentos=${lancamentos} abrirModal=${abrirModal} />`}
          ${tela==='relatorio' && html`<${Relatorio} config=${config} lancamentos=${lancamentos} />`}
          ${tela==='config' && html`<${Configuracoes} config=${config} backend=${backend} lancamentos=${lancamentos} />`}
        </div>
      </div>

      ${modal && html`<${ModalLancamento} config=${config} backend=${backend}
        contaInicial=${modal.contaId} editar=${modal.editar} fechar=${()=>setModal(null)} />`}
    </div>`;
}

render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
