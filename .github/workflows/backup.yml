name: Backup diário do Firestore

on:
  schedule:
    # 06:00 UTC = 03:00 em Brasília, todos os dias
    - cron: '0 6 * * *'
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Executar backup do Firestore
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: node backup.js

      - name: Salvar backup no repositório
        run: |
          git config user.name "backup-automatico"
          git config user.email "actions@users.noreply.github.com"
          git add backups/
          if git diff --cached --quiet; then
            echo "Nada novo para salvar."
          else
            git commit -m "Backup automático $(date -u +'%d/%m/%Y')"
            git push
          fi
